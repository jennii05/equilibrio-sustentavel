<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Agrinho: Futuro Sustentável</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <main class="game-container">
        <!-- Placar e Progresso -->
        <header class="game-header">
            <div class="progress">Pergunta <span id="current-question">1</span> de <span id="total-questions">4</span></div>
            <div class="score">Pontos: <span id="score-val">0</span></div>
        </header>

        <!-- Caixa da Pergunta Atual -->
        <section class="card-quiz">
            <h2 id="question-text">Carregando pergunta...</h2>
            
            <!-- Botões das Alternativas de Resposta -->
            <div class="options-container" id="options-box">
                <!-- O JavaScript vai injetar as opções aqui dentro -->
            </div>
        </section>

        <!-- Controle de Próxima -->
        <footer class="game-footer">
            <button id="next-btn" class="btn-next hide">Próxima Pergunta <i class="fa-solid fa-arrow-right"></i></button>
        </footer>
    </main>

    <!-- Tela de Fim de Jogo (Oculta até o final) -->
    <div id="end-screen" class="end-container hide">
        <i class="fa-solid fa-trophy trophy-icon"></i>
        <h2>Fim de Jogo!</h2>
        <p>Você completou o desafio do Agrinho Sustentável.</p>
        <div class="final-score">Pontuação Final: <span id="final-score-val">0</span></div>
        <button id="restart-btn" class="btn-restart"><i class="fa-solid fa-rotate-left"></i> Jogar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
