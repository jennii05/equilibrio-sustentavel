<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroForte Interativo | Soluções Sustentáveis Avançadas</title>
    <style>
        :root {
            --bg-color: #060b0f;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-blue: #00f2fe;
            --neon-green: #4facfe;
            --neon-lime: #00ff87;
            --neon-purple: #b927fc;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .glow-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        .glow-bg-right {
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 135, 0.08) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .badge-fun {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-green));
            color: #060b0f;
            font-weight: 800;
            padding: 8px 18px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            text-transform: uppercase;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 12px;
            font-weight: 900;
            letter-spacing: -1.5px;
        }

        .highlight {
            background: linear-gradient(to right, var(--neon-lime), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 80px 20px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0, 242, 254, 0.05);
        }

        h2 {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .card-description {
            color: var(--text-muted);
            margin-bottom: 28px;
            font-size: 1.05rem;
        }

        /* SIMULADOR */
        .slider-container {
            background: rgba(255, 255, 255, 0.01);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            gap: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .modern-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 10px;
            background: #131f2b;
            outline: none;
            cursor: pointer;
        }

        .modern-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--neon-lime);
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-lime);
            transition: var(--transition);
        }

        .modern-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        .slider-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 700;
            min-width: 95px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1.1rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
        }

        .neon-blue::before { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); }
        .neon-green::before { background: var(--neon-green); box-shadow: 0 0 20px var(--neon-green); }
        .neon-lime::before { background: var(--neon-lime); box-shadow: 0 0 20px var(--neon-lime); }
        .neon-purple::before { background: var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }

        .result-card .icon {
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-data h4 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .result-data p {
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* DASHBOARD DE DRONES */
        .dashboard-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .telemetry-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .drone-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .drone-status span {
            font-size: 1.1rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--neon-lime);
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-lime);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-lime);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        .telemetry-box p {
            margin: 6px 0;
            font-size: 0.95rem;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            height: 140px;
            gap: 16px;
            padding-top: 24px;
        }

        .bar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: linear-gradient(to top, var(--neon-blue), var(--neon-purple));
            border-radius: 8px 8px 0 0;
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            height: 0;
            box-shadow: 0 0 15px rgba(185, 39, 252, 0.2);
        }

        .bar-label {
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* CERTIFICADOR SELO VERDE */
        .badge-calc-box {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .check-label {
